server:
  port: ${PORT:8080}
  
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

    hikari:
      auto-commit: false
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000


  main:
    web-application-type: servlet

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  jpa:
    database: postgresql
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        order_inserts: true
        order_updates: true
        show_sql: true
        jdbc:
          prepare_sql: false
          time_zone: UTC
        connection:
          provider_disables_autocommit: true

supabase:
  url: ${SB_URL}
  serviceKey: ${SB_SERVICE_KEY}

  storage:
    buckets:
      events: events

app:
  jwt:
    time-in-minutes: 20
    secret: ${JWT_SECRET}